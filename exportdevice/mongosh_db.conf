# Shared connection settings for the LabMonitor mongosh maintenance scripts.
# Sourced by the drop / export / import / add scripts.
#
# NOTE: this file contains the admin password in plaintext. Restrict access:
#   chmod 600 mongosh_db.conf

MONGO_HOST="localhost:27017"
ADMIN_USER="admin"
ADMIN_PASS="password"
AUTH_DB="admin"
TARGET_DB="LabMonitorDB"

# Single collection that the Flask backend (data_collector.wsgi) writes every
# device's documents into. MUST match COLLECTION_NAME in the server's config.cfg.
# Used by mongosh_importdevice.sh and mongosh_adddevice.sh as the write target.
COLLECTION_NAME="LabMonitor"
